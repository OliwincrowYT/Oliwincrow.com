<div id="buttonDiv"></div> <!-- Empty container -->

<script>
    async function initializeLogin() {
        // 1. Fetch the "Secret" ID from your Worker
        const response = await fetch("https://workers.dev");
        const { clientId } = await response.json();

        // 2. Tell Google to initialize with that ID
        google.accounts.id.initialize({
            client_id: clientId,
            callback: handleCredentialResponse
        });

        // 3. Manually render the button
        google.accounts.id.renderButton(
            document.getElementById("buttonDiv"),
            { theme: "outline", size: "large" }
        );
    }

    // Run this when the page loads
    window.onload = initializeLogin;

    async function handleCredentialResponse(response) {
        // ... your existing verification logic ...
    }
</script>
