<!-- 1. Load the library with a custom onload function -->
<script src="https://accounts.google.com/gsi/client" onload="initGoogleSignIn()" async defer></script>

<!-- 2. Update your button to call the login function -->
<button class="btn-glow" onclick="promptGoogleSignIn()">Login</button>

<script>
    function initGoogleSignIn() {
        google.accounts.id.initialize({
            client_id: "1095502707976-p9ai1cq6v39jh4rr82b8d04ab7nt1503://googleusercontent.com", // Replace with your ID
            callback: handleCredentialResponse
        });
    }

    function promptGoogleSignIn() {
        google.accounts.id.prompt(); // This shows the One Tap or Popup
    }

    function handleCredentialResponse(response) {
        console.log("Encoded JWT ID token: " + response.credential);
        alert("Login successful! Check console for token.");
        // Send response.credential to your server here
    }
</script>
