<body style="background: black; color: white">

<h1>skibidi editor</h1>

<style>
    .btn-glow {
        background-color: #007bff; /* Nice blue */
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s; /* Makes the hover smooth */
        text-decoration: none; /* Removes underline if it's a link */
        display: inline-block;
    }

    /* This makes it glow when you hover over it */
    .btn-glow:hover {
        background-color: #0056b3;
        box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
        transform: translateY(-2px); /* Lifts it up slightly */
    }
</style>

<a class="btn-glow">Download</a>

</body>
