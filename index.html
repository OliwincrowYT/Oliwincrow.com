<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLIWIN CROW | Software Hub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f1115;
            --bg-card: #1a1d23;
            --accent-purple: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border-subtle: #2d333d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 75px;
            background: rgba(15, 17, 21, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .brand-logo .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-purple);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-purple);
        }

        .brand-logo img {
            height: 35px; /* Adjust this for logo size */
            width: auto;
            vertical-align: middle;
            transform-style: preserve-3d;
        }

        .nav-tools {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .tool-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-subtle);
        }

        .tool-btn.primary {
            background: var(--accent-purple);
            color: white;
            font-weight: 600;
            border: none;
        }

        .tool-btn.primary:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* --- HERO --- */
        .hero {
            padding: 180px 20px 100px;
            text-align: center;
            background: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #fff;
        }

        .hero h1 span {
            color: var(--accent-purple);
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .hero p {
            color: var(--text-dim);
            max-width: 650px;
            margin: 0 auto 40px;
            font-size: 1.15rem;
        }

        .search-wrap {
            max-width: 550px;
            margin: 0 auto;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 16px 20px 16px 50px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .search-wrap input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.1);
        }

        .search-wrap i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        /* --- CARDS --- */
        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .software-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 30px;
            transition: border-color 0.3s;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            transform: translateZ(20px);
        }

        .icon-box {
            width: 52px;
            height: 52px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-purple);
        }

        .status-tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 30px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .software-card h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            transform: translateZ(30px);
        }

        .software-card p {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 30px;
            transform: translateZ(15px);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-subtle);
            padding-top: 25px;
            transform: translateZ(10px);
        }

        .price {
            font-weight: 800;
            font-size: 1.3rem;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <a href="/" class="brand-logo">
        <div class="dot"></div>
        <span>OLIWI</span>
        <img src="logo.png" alt="Logo">
        <span>NCROW</span>
    </a>

    <div class="nav-tools">
        <button class="tool-btn"><i data-lucide="layers" size="18"></i> Catalog</button>
        <button class="tool-btn"><i data-lucide="activity" size="18"></i> Status</button>
        <button class="tool-btn"><i data-lucide="life-buoy" size="18"></i> Help</button>
        <button class="tool-btn primary">Dashboard</button>
    </div>
</header>

<main>
    <section class="hero">
        <h1>Made For <span>Speed</span></h1>
        <p>Goo Goo Ga Ga</p>

        <div class="search-wrap">
            <i data-lucide="search" size="20"></i>
            <input type="text" placeholder="Search our secure repository...">
        </div>
    </section>

    <div class="content-section">
        <div class="software-card">
            <div class="card-header">
                <div class="icon-box"><i data-lucide="terminal"></i></div>
                <span class="status-tag">Online</span>
            </div>
            <h3>Better Terminal</h3>
            <p>An upgraded terminal with more tools</p>
            <div class="card-footer">
                <span class="price">$24.99</span>
                <button class="tool-btn primary" style="padding: 8px 16px;">Purchase</button>
            </div>
        </div>

        <div class="software-card">
            <div class="card-header">
                <div class="icon-box"><i data-lucide="cpu"></i></div>
                <span class="status-tag">Online</span>
            </div>
            <h3>Get A Job</h3>
            <p>Costs a WHOLE lot of money</p>
            <div class="card-footer">
                <span class="price">$999.99</span>
                <button class="tool-btn primary" style="padding: 8px 16px;">Purchase</button>
            </div>
        </div>

        <div class="software-card">
            <div class="card-header">
                <div class="icon-box"><i data-lucide="shield"></i></div>
                <span class="status-tag" style="color: var(--accent-purple); background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.2);">Trending</span>
            </div>
            <h3>Ghost</h3>
            <p>Turns you into a ghost</p>
            <div class="card-footer">
                <span class="price">Free</span>
                <button class="tool-btn primary" style="padding: 8px 16px;">Purchase</button>
            </div>
        </div>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
<script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Initialize 3D Tilt Effect
    VanillaTilt.init(document.querySelectorAll(".software-card, .brand-logo img"), {
        max: 12,        // Max tilt angle
        speed: 800,     // Transition speed
        glare: true,    // Adds reflective light
        "max-glare": 0.2,
        gyroscope: true // Works on mobile tilting too
    });
</script>

</body>
</html>
