<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --dark: #2c3e50; --light: #f8f9fa; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 500px; text-align: center; }
        select, input, button { width: 100%; padding: 14px; margin: 12px 0; border-radius: 8px; border: 2px solid #eee; font-size: 1rem; box-sizing: border-box; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; transition: 0.2s; }
        button:disabled { background: #ccc; }
        #timer { font-family: monospace; font-size: 2.5rem; color: var(--danger); margin: 20px 0; background: #fff5f5; padding: 10px; border-radius: 8px; }
        .leaderboard { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .score-entry { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--light); margin-bottom: 5px; border-radius: 6px; }
        .hidden { display: none; }
        #auth-dock { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-area">
        <h2>Spelling Bee</h2>
        <select id="difficulty" onchange="displayLeaderboard()">
            <option value="Easy">Easy</option><option value="Intermediate">Intermediate</option>
            <option value="Hard">Hard</option><option value="Expert">Expert</option>
            <option value="Genius">Genius</option><option value="Troll">Troll</option>
        </select>

        <div id="game-controls" class="hidden">
            <input type="text" id="username" placeholder="Enter Display Name" maxlength="15">
            <button onclick="startGame()">Start Test</button>
        </div>

        <div id="login-msg" style="color: #888; font-size: 0.85rem; margin: 15px 0;">
            Sign in to participate
        </div>
    </div>

    <div id="game-area" class="hidden">
        <button style="background:#7f8c8d" onclick="speakWord()">🔊 Hear Word</button>
        <div id="timer">00:00:000</div>
        <input type="text" id="word-input" autocomplete="off" onpaste="return false" placeholder="Spell it here...">
        <button id="submit-btn" onclick="checkSpelling()">Submit</button>
    </div>

    <div class="leaderboard">
        <h3>Top Scores</h3>
        <div id="leaderboard-content"></div>
    </div>

    <div id="auth-dock">
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com" data-callback="handleAuth"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
        <button id="reset-btn" class="hidden" onclick="resetLB()" style="background:var(--danger); font-size:0.7rem; margin-top:20px; width:auto; padding:8px 15px;">RESET CATEGORY</button>
    </div>
</div>

<script>
    const wordBank = { Easy: ["Tree"], Intermediate: ["Bullet"], Hard: ["Trapeze"], Expert: ["Rhythm"], Genius: ["Pharaoh"], Troll: ["Supercalifragilisticexpialidocious"] };
    let startTime, timerInterval, currentWord;
    window.userToken = null;

    window.onload = displayLeaderboard;

    function speakWord() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentWord);
        u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    async function handleAuth(response) {
        window.userToken = response.credential;
        document.getElementById('game-controls').classList.remove('hidden');
        document.getElementById('login-msg').classList.add('hidden');

        const res = await fetch('/api/score', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential })
        });
        const { isAdmin } = await res.json();
        if (isAdmin) document.getElementById('reset-btn').classList.remove('hidden');
    }

    function startGame() {
        const name = document.getElementById('username').value.trim();
        if (!name) return alert("Please set a display name first!");

        currentWord = wordBank[document.getElementById('difficulty').value][0];
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');

        const input = document.getElementById('word-input');
        input.value = ""; input.focus();
        input.onkeypress = (e) => { if(e.key === 'Enter') checkSpelling(); };

        speakWord();
        startTime = new Date().getTime();
        timerInterval = setInterval(() => {
            const d = new Date().getTime() - startTime;
            const s = Math.floor((d % 60000) / 1000), ms = d % 1000;
            document.getElementById('timer').innerText = `${s.toString().padStart(2,'0')}:${ms.toString().padStart(3,'0')}`;
        }, 10);
    }

    async function checkSpelling() {
        if (document.getElementById('word-input').value.trim().toLowerCase() === currentWord.toLowerCase()) {
            clearInterval(timerInterval);
            const time = (new Date().getTime() - startTime) / 1000;
            document.getElementById('submit-btn').innerText = "UPDATING PERSONAL BEST...";

            await fetch('/api/score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('username').value,
                    diff: document.getElementById('difficulty').value,
                    time,
                    token: window.userToken
                })
            });
            resetGame();
            displayLeaderboard();
        }
    }

    async function displayLeaderboard() {
        const diff = document.getElementById('difficulty').value;
        const res = await fetch(`/api/score?diff=${diff}`);
        const data = await res.json();
        const container = document.getElementById('leaderboard-content');
        container.innerHTML = data.length ? "" : "No scores yet.";
        for (let i = 0; i < data.length; i += 2) {
            container.innerHTML += `<div class="score-entry"><span>${data[i]}</span><span>${parseFloat(data[i+1]).toFixed(3)}s</span></div>`;
        }
    }

    async function resetLB() {
        if (confirm("Reset current difficulty data?")) {
            await fetch('/api/score', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ diff: document.getElementById('difficulty').value, token: window.userToken })
            });
            displayLeaderboard();
        }
    }

    function resetGame() {
        document.getElementById('setup-area').classList.remove('hidden');
        document.getElementById('game-area').classList.add('hidden');
        document.getElementById('submit-btn').innerText = "Submit";
        clearInterval(timerInterval);
    }
</script>
</body>
</html>
