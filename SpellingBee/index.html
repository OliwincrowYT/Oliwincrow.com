<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLIWIN CROW | Spelling Bee Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1115; --card: #1a1d23; --accent: #8b5cf6; --text: #e2e8f0; --dim: #94a3b8; --border: #2d333d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-top: 100px; background: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 50%); }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; text-align: center; position: relative; }

        #timer { font-size: 5rem; font-weight: 800; text-shadow: 0 0 30px rgba(139, 92, 246, 0.4); margin: 20px 0; }

        input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 18px; border-radius: 14px; color: white; font-size: 1.2rem; text-align: center; outline: none; transition: 0.3s; margin-bottom: 20px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.1); }

        .btn { background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(139, 92, 246, 0.4); }
        .btn-host { background: #22c55e; margin-top: 10px; }

        .multi-hud { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .mini-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }

        .hidden { display: none !important; }
        #auth-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <div id="game-view">
        <div id="setup-card" class="game-card">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">The <span style="color:var(--accent)">Stage</span></h1>
            <p style="color:var(--dim); margin-bottom:30px;">Waiting for host to set the word...</p>
            <div id="player-setup" class="hidden">
                <input type="text" id="p-name" placeholder="Username">
                <p style="font-size:0.8rem; color:var(--accent);">YOU ARE CONNECTED</p>
            </div>
        </div>

        <div id="active-game" class="hidden">
            <div id="timer">00:00.000</div>
            <div class="game-card">
                <input type="text" id="word-input" placeholder="Type word here..." autocomplete="off">
                <button class="btn" onclick="submitAttempt()">Submit</button>
            </div>
        </div>

        <div class="multi-hud">
            <div class="mini-card" id="host-panel">
                <h3 style="color:var(--accent); font-size:0.8rem; margin-bottom:10px;">HOST CONSOLE</h3>
                <input type="text" id="host-word" placeholder="Custom word..." style="padding:10px; font-size:0.9rem;">
                <button class="btn btn-host" style="width:100%;" onclick="broadcastWord()">Set & Start</button>
            </div>
            <div class="mini-card">
                <h3 style="color:var(--accent); font-size:0.8rem; margin-bottom:10px;">LEADERBOARD</h3>
                <div id="lb-data" style="font-size:0.8rem;"></div>
            </div>
        </div>
    </div>
</div>

<div id="auth-dock">
    <div id="g-btn"></div>
</div>

<script>
    let curWord, startT, interval, pusher, channel;
    const room = "global-room"; // You can make this dynamic later

    window.onload = async () => {
        lucide.createIcons();
        const cfg = await (await fetch('/api/score?config=true')).json();

        // Google Auth
        google.accounts.id.initialize({ client_id: cfg.clientId, callback: (r) => {
            window.token = r.credential;
            document.getElementById('player-setup').classList.remove('hidden');
        }});
        google.accounts.id.renderButton(document.getElementById("g-btn"), { theme: "filled_black" });

        // Pusher Real-time
        pusher = new Pusher(cfg.pusherKey, { cluster: cfg.pusherCluster });
        channel = pusher.subscribe(room);

        channel.bind('new-word', (data) => {
            curWord = data.word;
            startRound();
        });

        loadLB();
    };

    async function broadcastWord() {
        const val = document.getElementById('host-word').value.trim();
        const res = await fetch('/api/score', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action: 'host_command', command: 'set_word', value: val, room, token: window.token })
        });
        if(!res.ok) alert("Word not recognized by dictionary!");
    }

    function startRound() {
        document.getElementById('setup-card').classList.add('hidden');
        document.getElementById('active-game').classList.remove('hidden');
        document.getElementById('word-input').value = "";
        document.getElementById('word-input').focus();

        // TTS
        const u = new SpeechSynthesisUtterance(curWord);
        u.rate = 0.8;
        window.speechSynthesis.speak(u);

        startT = Date.now();
        interval = setInterval(() => {
            const d = Date.now() - startT;
            const s = Math.floor(d/1000).toString().padStart(2,'0');
            const ms = (d%1000).toString().padStart(3,'0');
            document.getElementById('timer').innerText = `${s}:${ms}`;
        }, 10);
    }

    async function submitAttempt() {
        if(document.getElementById('word-input').value.toLowerCase().trim() === curWord.toLowerCase()) {
            clearInterval(interval);
            const time = (Date.now() - startT) / 1000;
            await fetch('/api/score', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: document.getElementById('p-name').value, diff: 'Multiplayer', time, token: window.token })
            });
            alert("Finished in " + time + "s!");
            location.reload();
        }
    }

    async function loadLB() {
        const r = await fetch('/api/score?diff=Multiplayer');
        const d = await r.json();
        let h = "";
        for(let i=0; i<d.length; i+=2) h += `<div>${d[i]}: <span style="color:var(--accent)">${d[i+1]}s</span></div>`;
        document.getElementById('lb-data').innerHTML = h || "No runs yet";
    }
</script>
</body>
</html>
