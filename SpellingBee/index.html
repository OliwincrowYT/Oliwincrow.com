<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLIWIN CROW | Spelling Bee Stage</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115; --card: #1a1d23; --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.4);
            --text: #e2e8f0; --dim: #94a3b8; --border: #2d333d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        /* Navigation */
        header {
            height: 75px; background: rgba(15, 21, 21, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .logo { font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }

        /* Stage Area */
        .stage { padding: 120px 20px 40px; text-align: center; max-width: 900px; margin: 0 auto; }
        #timer { font-size: 5rem; font-weight: 800; text-shadow: 0 0 30px var(--accent-glow); margin: 20px 0; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; position: relative; }
        input[type="text"] {
            width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 18px;
            border-radius: 14px; color: white; font-size: 1.2rem; text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.1); }

        .btn {
            background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--accent-glow); }

        /* HUD Panels */
        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .hud-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: left; }

        .hidden { display: none !important; }
        #auth-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="dot"></div> OLIWIN<span style="color:var(--accent)">CROW</span></div>
    <div id="user-info" style="font-size: 0.8rem; color: var(--dim);">AUTHENTICATION REQUIRED</div>
</header>

<main class="stage">
    <div id="timer">00:00.000</div>

    <div id="game-card" class="card">
        <h2 id="status-text" style="margin-bottom: 20px;">Waiting for Host...</h2>
        <div id="play-area" class="hidden">
            <input type="text" id="word-input" placeholder="Type word here..." autocomplete="off">
            <button class="btn" style="margin-top: 20px; width: 100%;" onclick="submitWord()">Submit Word</button>
        </div>
        <div id="lobby-area">
            <input type="text" id="p-name" placeholder="Your Display Name" style="margin-bottom: 20px;">
            <p style="color:var(--dim)">Identify yourself to join the stage</p>
        </div>
    </div>

    <div class="hud-grid">
        <div id="host-console" class="hud-panel hidden">
            <h3 style="color:var(--accent); font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 1px;">HOST COMMANDS</h3>
            <input type="text" id="host-word" placeholder="Custom word..." style="padding: 10px; font-size: 0.9rem; margin-bottom: 10px;">
            <button class="btn" style="width: 100%; padding: 10px; font-size: 0.8rem;" onclick="sendHostWord()">Broadcast Word</button>
        </div>

        <div class="hud-panel">
            <h3 style="color:var(--accent); font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 1px;">TOP SCORES</h3>
            <div id="lb-list" style="font-size: 0.85rem;"></div>
        </div>
    </div>
</main>

<div id="auth-dock"><div id="g-btn"></div></div>

<script>
    let curWord, startT, timerInt, pusher, channel;
    window.token = null;

    window.onload = async () => {
        lucide.createIcons();
        const cfg = await (await fetch('/api/score?config=true')).json();

        // Auth Init
        google.accounts.id.initialize({ client_id: cfg.clientId, callback: onAuth });
        google.accounts.id.renderButton(document.getElementById("g-btn"), { theme: "filled_black", shape: "pill" });

        // Pusher Real-time
        pusher = new Pusher(cfg.pusherKey, { cluster: cfg.pusherCluster });
        channel = pusher.subscribe('spelling-bee-room');

        channel.bind('new-round', (data) => {
            curWord = data.word;
            startRound();
        });

        updateLB();
    };

    function onAuth(res) {
        window.token = res.credential;
        document.getElementById('auth-dock').classList.add('hidden');
        document.getElementById('host-console').classList.remove('hidden');
        document.getElementById('user-info').innerText = "STAGE CONNECTED";
    }

    async function sendHostWord() {
        const val = document.getElementById('host-word').value.trim();
        const res = await fetch('/api/score', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action: 'host_command', command: 'set_word', value: val, room: 'spelling-bee-room', token: window.token })
        });
        if(!res.ok) alert("Auto-correct: That word isn't in the dictionary!");
    }

    function startRound() {
        document.getElementById('lobby-area').classList.add('hidden');
        document.getElementById('play-area').classList.remove('hidden');
        document.getElementById('status-text').innerText = "SPELL THE WORD!";
        document.getElementById('word-input').value = "";
        document.getElementById('word-input').focus();

        // TTS
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(curWord);
        utter.rate = 0.8;
        synth.speak(utter);

        startT = Date.now();
        timerInt = setInterval(() => {
            const d = Date.now() - startT;
            const s = Math.floor(d/1000).toString().padStart(2,'0');
            const ms = (d%1000).toString().padStart(3,'0');
            document.getElementById('timer').innerText = `${s}:${ms}`;
        }, 10);
    }

    async function submitWord() {
        if(document.getElementById('word-input').value.toLowerCase().trim() === curWord.toLowerCase()) {
            clearInterval(timerInt);
            const time = (Date.now() - startT) / 1000;
            await fetch('/api/score', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: document.getElementById('p-name').value || "Guest", diff: 'Multiplayer', time, token: window.token })
            });
            alert(`Round Complete! Time: ${time}s`);
            location.reload();
        }
    }

    async function updateLB() {
        const res = await fetch('/api/score?diff=Multiplayer');
        const data = await res.json();
        let html = "";
        for(let i=0; i<data.length; i+=2) {
            html += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--border);">
                        <span>${data[i]}</span><span style="color:var(--accent)">${data[i+1]}s</span>
                     </div>`;
        }
        document.getElementById('lb-list').innerHTML = html || "No scores yet";
    }
</script>
</body>
</html>
