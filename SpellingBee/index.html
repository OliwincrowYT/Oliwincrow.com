<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLIWIN CROW | Multi-Room Stage</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1115; --card: #1a1d23; --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.4); --text: #e2e8f0; --dim: #94a3b8; --border: #2d333d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; background: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 50%); padding-top: 80px; }
        header { height: 75px; background: rgba(15,17,21,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #timer { font-size: 4rem; font-weight: 800; text-shadow: 0 0 20px var(--accent-glow); margin: 15px 0; font-variant-numeric: tabular-nums; }
        input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; font-size: 1.1rem; text-align: center; outline: none; margin-bottom: 15px; }
        input:focus { border-color: var(--accent); }
        .btn { background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--accent-glow); }
        .btn-secondary { background: #333; margin-top: 10px; }
        .room-tag { background: rgba(139, 92, 246, 0.1); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:800; font-size:1.2rem;">OLIWIN<span style="color:var(--accent)">CROW</span></div>
    <div id="g_signin_wrapper"></div>
</header>

<div class="container">
    <div id="lobby-view" class="card">
        <h2 style="margin-bottom:10px;">The Stage</h2>
        <p id="auth-status" style="color:var(--dim); margin-bottom:20px;">Please login to join a room</p>

        <div id="lobby-actions" class="hidden">
            <input type="text" id="display-name" placeholder="Your Display Name" maxlength="12">
            <button class="btn" onclick="createRoom()">Create Private Room</button>
            <div style="margin:20px 0; color:var(--dim); font-size:0.8rem;">OR</div>
            <input type="text" id="join-code-input" placeholder="Enter Room Code (e.g. B4DLQ)" maxlength="5" style="text-transform:uppercase;">
            <button class="btn btn-secondary" onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <div id="room-view" class="card hidden">
        <div class="room-tag" id="room-display">ROOM: -----</div>
        <div id="timer">0.000</div>

        <div id="host-zone" class="hidden">
            <input type="text" id="host-word" placeholder="Host: Type custom word...">
            <button class="btn" onclick="sendWord()">Start Round</button>
        </div>

        <div id="player-zone" class="hidden">
            <p id="player-status" style="color:var(--dim); margin-bottom:10px;">Waiting for host...</p>
            <div id="input-wrap" class="hidden">
                <input type="text" id="word-input" placeholder="Spell the word..." autocomplete="off">
                <button class="btn" onclick="submitSpelling()">Submit</button>
            </div>
        </div>
    </div>
</div>

<script>
    let pusher, channel, curRoom, curWord, startT, timerInt;

    window.onload = async () => {
        const res = await fetch('/api/score?config=true');
        const cfg = await res.json();

        google.accounts.id.initialize({
            client_id: cfg.clientId,
            callback: (r) => {
                sessionStorage.setItem('token', r.credential);
                initLobby();
            }
        });
        google.accounts.id.renderButton(document.getElementById("g_signin_wrapper"), { theme: "filled_black", shape: "pill" });

        pusher = new Pusher(cfg.pusherKey, { cluster: cfg.pusherCluster });
        if (sessionStorage.getItem('token')) initLobby();
    };

    function initLobby() {
        document.getElementById('auth-status').classList.add('hidden');
        document.getElementById('g_signin_wrapper').classList.add('hidden');
        document.getElementById('lobby-actions').classList.remove('hidden');
    }

    function createRoom() {
        const code = Math.random().toString(36).substring(2, 7).toUpperCase();
        sessionStorage.setItem('isHost', 'true');
        enterRoom(code);
    }

    function joinRoom() {
        const code = document.getElementById('join-code-input').value.toUpperCase();
        if (code.length < 5) return alert("Invalid Code");
        sessionStorage.setItem('isHost', 'false');
        enterRoom(code);
    }

    function enterRoom(code) {
        curRoom = code;
        document.getElementById('lobby-view').classList.add('hidden');
        document.getElementById('room-view').classList.remove('hidden');
        document.getElementById('room-display').innerText = `ROOM: ${code}`;

        if (sessionStorage.getItem('isHost') === 'true') {
            document.getElementById('host-zone').classList.remove('hidden');
        } else {
            document.getElementById('player-zone').classList.remove('hidden');
        }

        channel = pusher.subscribe(`room-${code}`);
        channel.bind('new-round', (data) => {
            curWord = data.word;
            startRound();
        });
    }

    async function sendWord() {
        const word = document.getElementById('host-word').value.trim();
        const res = await fetch('/api/score', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action: 'host_command', command: 'set_word', value: word, room: curRoom, token: sessionStorage.getItem('token') })
        });
        if (!res.ok) alert("Invalid Word!");
    }

    function startRound() {
        document.getElementById('input-wrap').classList.remove('hidden');
        document.getElementById('player-status').classList.add('hidden');
        document.getElementById('word-input').value = "";
        document.getElementById('word-input').focus();

        const utter = new SpeechSynthesisUtterance(curWord);
        utter.rate = 0.85;
        window.speechSynthesis.speak(utter);

        startT = Date.now();
        timerInt = setInterval(() => {
            document.getElementById('timer').innerText = ((Date.now() - startT) / 1000).toFixed(3);
        }, 10);
    }

    async function submitSpelling() {
        if (document.getElementById('word-input').value.toLowerCase().trim() === curWord.toLowerCase()) {
            clearInterval(timerInt);
            const time = (Date.now() - startT) / 1000;
            await fetch('/api/score', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('display-name').value || "Guest",
                    diff: 'Multiplayer',
                    time,
                    token: sessionStorage.getItem('token')
                })
            });
            alert(`Cleared in ${time}s!`);
            location.reload(); // Returns to lobby while keeping token in sessionStorage
        }
    }
</script>
</body>
</html>
