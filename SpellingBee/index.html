<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLIWIN CROW | Spelling Bee</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115; --card: #1a1d23; --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.4);
            --text: #e2e8f0; --dim: #94a3b8; --border: #2d333d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; background: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 50%); }

        header {
            height: 75px; background: rgba(15, 17, 21, 0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .logo { font-weight: 800; display: flex; align-items: center; gap: 8px; font-size: 1.2rem; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }

        .stage { padding: 120px 20px 40px; text-align: center; max-width: 800px; margin: 0 auto; }
        #timer { font-size: 5rem; font-weight: 800; text-shadow: 0 0 30px var(--accent-glow); margin: 20px 0; font-variant-numeric: tabular-nums; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; position: relative; }
        input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: white; font-size: 1.1rem; text-align: center; outline: none; margin-bottom: 15px; }
        input:focus { border-color: var(--accent); }

        .btn { background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; text-align: left; }
        .hud-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }

        .hidden { display: none !important; }
        #g-login-btn { min-width: 200px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="dot"></div> OLIWIN<span style="color:var(--accent)">CROW</span></div>
    <div id="g-login-btn"></div> </header>

<main class="stage">
    <div id="timer">00:00.000</div>

    <div class="card">
        <div id="lobby-state">
            <h2 style="margin-bottom:10px;">The Stage</h2>
            <p id="status-msg" style="color:var(--dim); margin-bottom:20px;">Sign in to join the game</p>
            <div id="player-inputs" class="hidden">
                <input type="text" id="p-name" placeholder="Enter Display Name">
                <p style="font-size: 0.8rem; color: var(--accent);">Connected & Ready</p>
            </div>
        </div>

        <div id="game-state" class="hidden">
            <input type="text" id="word-input" placeholder="Spell it now..." autocomplete="off">
            <button class="btn" onclick="submitWord()">Submit</button>
        </div>
    </div>

    <div class="hud-grid">
        <div id="host-controls" class="hud-panel hidden">
            <h3 style="color:var(--accent); font-size:0.7rem; margin-bottom:10px;">HOST CONSOLE</h3>
            <input type="text" id="h-word" placeholder="Custom word..." style="padding:10px; font-size:0.9rem;">
            <button class="btn" style="padding:10px;" onclick="broadcast()">Set Word</button>
        </div>
        <div class="hud-panel">
            <h3 style="color:var(--accent); font-size:0.7rem; margin-bottom:10px;">LEADERBOARD</h3>
            <div id="lb-view" style="font-size:0.85rem;"></div>
        </div>
    </div>
</main>

<script>
    let curWord, startT, timerInt, pusher, channel;
    window.token = null;

    window.onload = async () => {
        lucide.createIcons();
        const res = await fetch('/api/score?config=true');
        const cfg = await res.json();

        // Initialize Google Auth
        google.accounts.id.initialize({
            client_id: cfg.clientId,
            callback: handleAuth,
            auto_select: false
        });

        // Render button explicitly
        google.accounts.id.renderButton(
            document.getElementById("g-login-btn"),
            { theme: "filled_black", size: "medium", shape: "pill" }
        );

        // Pusher Real-time
        pusher = new Pusher(cfg.pusherKey, { cluster: cfg.pusherCluster });
        channel = pusher.subscribe('spelling-bee-room');
        channel.bind('new-round', (data) => {
            curWord = data.word;
            triggerGame();
        });

        updateLeaderboard();
    };

    function handleAuth(response) {
        window.token = response.credential;
        document.getElementById('g-login-btn').classList.add('hidden');
        document.getElementById('player-inputs').classList.remove('hidden');
        document.getElementById('host-controls').classList.remove('hidden');
        document.getElementById('status-msg').innerText = "Waiting for word...";
    }

    async function broadcast() {
        const val = document.getElementById('h-word').value.trim();
        const res = await fetch('/api/score', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action: 'host_command', command: 'set_word', value: val, room: 'spelling-bee-room', token: window.token })
        });
        if(!res.ok) alert("Word not in dictionary!");
    }

    function triggerGame() {
        document.getElementById('lobby-state').classList.add('hidden');
        document.getElementById('game-state').classList.remove('hidden');
        document.getElementById('word-input').value = "";
        document.getElementById('word-input').focus();

        const utter = new SpeechSynthesisUtterance(curWord);
        utter.rate = 0.85;
        window.speechSynthesis.speak(utter);

        startT = Date.now();
        timerInt = setInterval(() => {
            const d = Date.now() - startT;
            const s = Math.floor(d/1000).toString().padStart(2,'0');
            const ms = (d%1000).toString().padStart(3,'0');
            document.getElementById('timer').innerText = `${s}:${ms}`;
        }, 10);
    }

    async function submitWord() {
        if(document.getElementById('word-input').value.toLowerCase().trim() === curWord.toLowerCase()) {
            clearInterval(timerInt);
            const time = (Date.now() - startT) / 1000;
            await fetch('/api/score', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: document.getElementById('p-name').value || "Guest", diff: 'Multiplayer', time, token: window.token })
            });
            location.reload();
        }
    }

    async function updateLeaderboard() {
        const res = await fetch('/api/score?diff=Multiplayer');
        const data = await res.json();
        let html = "";
        for(let i=0; i<data.length; i+=2) {
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid var(--border); padding-bottom:3px;">
                        <span>${data[i]}</span><span style="color:var(--accent)">${data[i+1]}s</span>
                     </div>`;
        }
        document.getElementById('lb-view').innerHTML = html || "No scores yet";
    }
</script>
</body>
</html>
