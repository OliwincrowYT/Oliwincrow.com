<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee Stage</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0a0a0a; --panel: rgba(0,0,0,0.8); }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #121212; color: white; font-family: 'Arial Black', sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        /* The Big Screen from your screenshot */
        .stage-container {
            width: 85vw; max-width: 900px; height: 60vh;
            background: var(--panel);
            border: 10px solid #333; border-radius: 8px;
            box-shadow: 0 0 0 5px #111, 0 0 40px rgba(0,255,204,0.2);
            position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        /* LED Border lights effect */
        .stage-container::after {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
            border: 6px dotted #555; border-radius: 12px; pointer-events: none;
        }
        #timer { font-size: 6rem; color: #fff; text-shadow: 0 0 20px var(--accent); margin: 10px 0; }
        h2 { font-size: 3rem; margin: 0; letter-spacing: -2px; color: var(--accent); }

        .ui-row { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input {
            background: #000; border: 3px solid #444; color: var(--accent);
            font-size: 2rem; padding: 15px; width: 60%; text-align: center; border-radius: 10px;
        }
        input:focus { border-color: var(--accent); outline: none; }

        button {
            background: var(--accent); color: #000; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: 900; cursor: pointer; border-radius: 5px;
            text-transform: uppercase; transition: 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; cursor: not-allowed; }

        /* HUD Leaderboard */
        .hud-lb {
            position: absolute; top: 20px; right: -250px; width: 220px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px;
            font-family: sans-serif; font-weight: bold; text-align: left;
        }
        .score-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        .hidden { display: none !important; }
        #auth-area { position: fixed; bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="stage-container">
        <div class="hud-lb">
            <div style="color:var(--accent); margin-bottom:10px;">TOP PLAYERS</div>
            <div id="lb-list"></div>
        </div>

        <div id="setup-screen">
            <h2>SPELLING BEE</h2>
            <select id="diff" onchange="loadLB()" style="background:#222; color:#fff; border:none; padding:10px; margin-bottom:20px;">
                <option value="Easy">EASY</option><option value="Hard">HARD</option><option value="Troll">TROLL</option>
            </select>
            <div class="ui-row">
                <input type="text" id="p-name" placeholder="YOUR NAME" maxlength="12">
                <button id="start-btn" onclick="startGame()">START STAGE</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div id="timer">00:00.000</div>
            <div class="ui-row">
                <input type="text" id="word-box" autocomplete="off" placeholder="TYPE...">
                <button onclick="checkWord()">SUBMIT</button>
                <button onclick="hear()" style="background:#444; color:#fff; font-size:0.8rem;">REPLAY AUDIO</button>
            </div>
        </div>
    </div>

    <div id="auth-area">
        <div id="g-btn"></div>
        <button id="admin-wipe" class="hidden" onclick="wipe()" style="background:red; color:white; font-size:0.6rem;">WIPE DATA</button>
    </div>

<script>
    const words = { Easy: ["Apple"], Hard: ["Rhythm"], Troll: ["Supercalifragilisticexpialidocious"] };
    let curWord, startT, interval;
    window.token = null;

    // Safety: Load LB even if auth fails
    window.onload = () => {
        setupAuth();
        loadLB();
    };

    async function setupAuth() {
        try {
            const r = await fetch('/api/score?config=true');
            const d = await r.json();
            google.accounts.id.initialize({ client_id: d.clientId, callback: (res) => {
                window.token = res.credential;
                document.getElementById('start-btn').disabled = false;
                checkAdmin();
            }});
            google.accounts.id.renderButton(document.getElementById("g-btn"), { theme: "filled_black" });
        } catch(e) { console.log("Auth offline"); }
    }

    async function checkAdmin() {
        const r = await fetch('/api/score', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({token: window.token}) });
        const d = await r.json();
        if(d.isAdmin) document.getElementById('admin-wipe').classList.remove('hidden');
    }

    function hear() {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(curWord);
        u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    function startGame() {
        if(!window.token) return alert("Log in first!");
        const name = document.getElementById('p-name').value.trim();
        if(!name) return alert("Enter a name!");

        curWord = words[document.getElementById('diff').value][0];
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');

        document.getElementById('word-box').value = "";
        document.getElementById('word-box').focus();

        hear();
        startT = Date.now();
        interval = setInterval(() => {
            let d = Date.now() - startT;
            let s = Math.floor(d/1000).toString().padStart(2,'0');
            let ms = (d%1000).toString().padStart(3,'0');
            document.getElementById('timer').innerText = `${s}:${ms}`;
        }, 10);
    }

    async function checkWord() {
        if(document.getElementById('word-box').value.toLowerCase().trim() === curWord.toLowerCase()) {
            clearInterval(interval);
            const finalT = (Date.now() - startT) / 1000;
            await fetch('/api/score', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('p-name').value,
                    diff: document.getElementById('diff').value,
                    time: finalT,
                    token: window.token
                })
            });
            location.reload(); // Quick reset
        }
    }

    async function loadLB() {
        const r = await fetch(`/api/score?diff=${document.getElementById('diff').value}`);
        const d = await r.json();
        let html = "";
        for(let i=0; i<d.length; i+=2) {
            html += `<div class="score-item"><span>${d[i]}</span><span style="color:var(--accent)">${d[i+1]}s</span></div>`;
        }
        document.getElementById('lb-list').innerHTML = html || "Empty";
    }

    async function wipe() {
        if(confirm("Wipe?")) {
            await fetch('/api/score', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({diff: document.getElementById('diff').value, token: window.token}) });
            loadLB();
        }
    }
</script>
</body>
</html>
